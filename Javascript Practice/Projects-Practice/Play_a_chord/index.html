<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click and Play a chord</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Click the button of chords and enjoy the melody</h1>
    <div>
        <button id="btnforC">Play C chord
        <audio id="cChord" src="./C-Strum-guitar.mp3"></audio>
    </button>
    </div>
    <div>
        <button id="btnforD">Play D chord
        <audio id="dChord" src="./D-Chord-Guitar.mp3"></audio>
    </button>
    </div>
    <div>
        <button id="btnforEm">Play E-minor chord
        <audio id="emChord" src="./Em-Strum-Guitar.mp3"></audio>
    </button>
    </div>
    <div>
        <button id="strumDC"> Play Both C and D chord
            <!-- <audio id="bothD&C" src="./C-Strum-guitar.mp3"></audio>
            <audio src="./D-Chord-Guitar.mp3"></audio> -->
        </button>
       
    </div>
    <script src="index.js"></script>
</body>
</html>
